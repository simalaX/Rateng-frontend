services:
  - type: web
    name: rateng-frontend
    runtime: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: REACT_APP_GOOGLE_RATING
        value: "4.9"
      - key: REACT_APP_GOOGLE_REVIEW_COUNT
        value: "50+"
      - key: REACT_APP_MAP_QUERY
        value: "Nairobi, Kenya"
      - key: CI
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
